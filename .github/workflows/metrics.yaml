name: GitHub Metrics

on:
  # Ручной запуск
  workflow_dispatch:
  
  # Автоматический запуск раз в день
  schedule:
    - cron: "0 0 * * *"

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
          
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ad-Ok
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: true
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes
          config_octicon: true
          config_display: large
          config_timezone: Asia/Tbilisi
          config_twemoji: true
          
          # Плагин языков программирования
          plugin_languages: true
          plugin_languages_analysis_timeout: 60
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_other: true
          plugin_languages_threshold: 0%
          
          # Автокоммит
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_branch: main
          committer_message: "📈 Update GitHub metrics"
      
      # Сохранить как артефакт для preview (можно скачать и посмотреть)
      - name: Upload metrics as artifact
        uses: actions/upload-artifact@v5
        with:
          name: github-metrics-preview
          path: github-metrics.svg
          retention-days: 5
